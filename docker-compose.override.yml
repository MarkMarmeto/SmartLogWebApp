# Development overrides - use with: docker compose up
services:
  smartlog-web:
    build:
      context: ./src/SmartLog.Web
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ASPNETCORE_HTTP_PORTS=5001
      - SMARTLOG_HMAC_SECRET_KEY=dev-hmac-key-not-for-production
      - SMARTLOG_SEED_PASSWORD=Dev@2026!
    ports:
      - "8080:5001"   # HTTP - Map external 8080 to internal 5001
