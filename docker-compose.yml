services:
  smartlog-web:
    build:
      context: ./src/SmartLog.Web
      dockerfile: Dockerfile
    container_name: smartlog-web
    ports:
      - "8080:5001"   # HTTP - Map external 8080 to internal 5001
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5001
      - ASPNETCORE_HTTP_PORTS=5001
      - ConnectionStrings__DefaultConnection=Server=smartlog-db;Database=SmartLog;User Id=sa;Password=SmartLog2026!;TrustServerCertificate=true
    depends_on:
      smartlog-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smartlog-network

  smartlog-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartlog-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SmartLog2026!
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - smartlog-db-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "SmartLog2026!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - smartlog-network

networks:
  smartlog-network:
    driver: bridge

volumes:
  smartlog-db-data:
